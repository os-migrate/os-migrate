---
# Test playbook for spawning nbdkit on hypervisor
# WARNING: FOR TESTING ONLY - DO NOT USE IN PRODUCTION

- name: Spawn nbdkit on hypervisor for workload migration testing
  hosts: localhost
  gather_facts: true
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ os_migrate_clouds_path | default(os_migrate_data_dir ~ '/clouds.yaml') }}"

  vars:
    # Path to workload YAML file
    workload_file_path: "{{ os_migrate_data_dir }}/workloads.yml"

    # Hypervisor configuration
    # You can set this to a specific hypervisor or detect it from the instance
    hypervisor_host: "{{ override_hypervisor_host | default('') }}"

    # Destination conversion host IP for IP filtering
    destination_conversion_host_ip: "{{ os_dst_conversion_host_info.openstack_conversion_host.address | default('') }}"

  tasks:
    - name: Load workload data
      ansible.builtin.slurp:
        src: "{{ workload_file_path }}"
      register: workload_file

    - name: Parse workload YAML
      ansible.builtin.set_fact:
        workload_resources: "{{ (workload_file.content | b64decode | from_yaml).resources }}"

    - name: Filter workloads with nbdkit direct mode enabled
      ansible.builtin.set_fact:
        nbdkit_workloads: >-
          {{
            workload_resources |
            selectattr('_migration_params.use_nbdkit_direct', 'defined') |
            selectattr('_migration_params.use_nbdkit_direct', 'equalto', true) |
            list
          }}

    - name: Display workloads to process
      ansible.builtin.debug:
        msg: "Found {{ nbdkit_workloads | length }} workload(s) with nbdkit direct mode enabled"

    - name: Fail if no workloads found
      ansible.builtin.fail:
        msg: "No workloads with use_nbdkit_direct: true found in {{ workload_file_path }}"
      when: nbdkit_workloads | length == 0

    - name: Get destination conversion host info
      os_migrate.os_migrate.os_conversion_host_info:
        cloud: dst
        validate_certs: "{{ os_migrate_dst_validate_certs | default(omit) }}"
        ca_cert: "{{ os_migrate_dst_ca_cert | default(omit) }}"
        client_cert: "{{ os_migrate_dst_client_cert | default(omit) }}"
        client_key: "{{ os_migrate_dst_client_key | default(omit) }}"
        server_id: "{{ os_migrate_dst_conversion_host_id }}"
      register: os_dst_conversion_host_info
      when: destination_conversion_host_ip == ''

    - name: Set destination IP for IP filtering
      ansible.builtin.set_fact:
        dest_ip: "{{ destination_conversion_host_ip if destination_conversion_host_ip != '' else os_dst_conversion_host_info.openstack_conversion_host.address }}"

    - name: Display destination conversion host IP
      ansible.builtin.debug:
        msg: "Destination conversion host IP: {{ dest_ip }}"

    - name: Process each workload
      ansible.builtin.include_tasks: test_spawn_nbdkit_workload.yml
      loop: "{{ nbdkit_workloads }}"
      loop_control:
        loop_var: workload_item
        label: "{{ workload_item.params.name }}"

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "Successfully processed {{ nbdkit_workloads | length }} workload(s)"
          - ""
          - "Next steps:"
          - "1. Verify nbdkit is accessible from destination conversion host"
          - "2. Run import_workloads playbook to perform migration"
          - ""
          - "To verify connectivity:"
          - "  nbdinfo nbd://<hypervisor>:10809"
          - ""
          - "To cleanup nbdkit processes:"
          - "  sudo pkill -f 'nbdkit.*10809'"
