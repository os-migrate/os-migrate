---
# Main tasks for import_from_hypervisor role
# Spawns nbdkit on hypervisors for workloads with use_nbdkit_direct enabled

- name: Read workloads file
  ansible.builtin.slurp:
    src: "{{ os_migrate_data_dir }}/workloads.yml"
  register: workloads_file

- name: Parse workloads YAML
  ansible.builtin.set_fact:
    all_workloads: "{{ (workloads_file.content | b64decode | from_yaml).resources }}"

- name: Filter workloads with nbdkit direct mode enabled
  ansible.builtin.set_fact:
    nbdkit_workloads: >-
      {{
        all_workloads |
        selectattr('_migration_params.use_nbdkit_direct', 'defined') |
        selectattr('_migration_params.use_nbdkit_direct', 'equalto', true) |
        list
      }}

- name: Display nbdkit workloads count
  ansible.builtin.debug:
    msg: "Found {{ nbdkit_workloads | length }} workload(s) with use_nbdkit_direct enabled"

- name: Process each workload with nbdkit direct mode
  ansible.builtin.include_tasks: workload.yml
  loop: "{{ nbdkit_workloads }}"
  loop_control:
    loop_var: workload_item
    label: "{{ workload_item.params.name }}"
  when: nbdkit_workloads | length > 0
