- name: Get the current openstacksdk version
  ansible.builtin.command: python3 -c "import importlib.metadata; print(importlib.metadata.version('openstacksdk'))"
  register: _installed_openstacksdk_cmd
  changed_when: false

- name: Print items for sdk version
  ansible.builtin.debug:
    msg: "{{ _installed_openstacksdk_cmd }}"

- name: Set openstacksdk version fact
  ansible.builtin.set_fact:
    # Read the raw string directly from stdout. If python failed, default to '0.0.0'
    _installed_openstacksdk_versions: "{{ _installed_openstacksdk_cmd.stdout | trim if _installed_openstacksdk_cmd.rc == 0 else '0.0.0' }}"

- name: Print the current installed version of openstacksdk
  ansible.builtin.debug:
    var: _installed_openstacksdk_versions

- name: Fail if the user has an unsupported openstacksdk version
  ansible.builtin.assert:
    that:
      - _installed_openstacksdk_cmd.rc == 0
      - _installed_openstacksdk_versions is version(prelude_common_minimum_openstacksdk_version, '>=')
    fail_msg: |
      {% if _installed_openstacksdk_cmd.rc != 0 %}
      openstacksdk does not appear to be installed in the system Python environment.
      {% else %}
      The installed openstacksdk version {{ _installed_openstacksdk_versions }}
      must be >= than {{ prelude_common_minimum_openstacksdk_version }}
      {% endif %}
    success_msg: |
      The installed openstacksdk version {{ _installed_openstacksdk_versions }}
      is >= than {{ prelude_common_minimum_openstacksdk_version }}

- name: Write to auth file
  ansible.builtin.template:
    src: clouds.yaml.j2
    dest: "{{ os_migrate_clouds_path | default(os_migrate_data_dir ~ '/clouds.yaml') }}"
    mode: '0600'
