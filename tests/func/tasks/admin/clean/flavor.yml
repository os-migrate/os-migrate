- name: remove src/dst flavors
  os_migrate.os_migrate.compute_flavor:
    auth: "{{ item['auth'] }}"
    name: "{{ item['flavor'] }}"
    state: absent
  loop:
    - auth: "{{ os_migrate_src_auth }}"
      flavor: osm_flavor
    - auth: "{{ os_migrate_dst_auth }}"
      flavor: osmdst_flavor
    - auth: "{{ os_migrate_src_auth }}"
      flavor: osm_flavor_specless
    - auth: "{{ os_migrate_dst_auth }}"
      flavor: osmdst_flavor_specless
